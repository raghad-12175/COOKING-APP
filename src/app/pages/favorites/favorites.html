<div class="page-header">
  <h1> My Favorites : </h1>
  <p>{{ favoritesCount() }} saved recipes</p>
</div>

<app-recipe-grid [recipes]="recipes" [loading]="loading"></app-recipe-grid>

<div *ngIf="!loading && recipes.length === 0" class="empty-state">
  <h2>😔 No favorites yet</h2>
  <p>Start adding recipes to your favorites by clicking the heart icon!</p>
</div>
