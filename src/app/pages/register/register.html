<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>✨ Create Account</h1>
      <p>Join us to save your favorite recipes</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Sara Ahmed"
        />
        <span class="error-text" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Name must be at least 2 characters
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="your@email.com"
        />
        <span class="error-text" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
        />
        <span class="error-text" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || loading">
        {{ loading ? '⏳ Creating account...' : '✨ Sign Up' }}
      </button>

      <p class="auth-switch">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </form>
  </div>
</div>
