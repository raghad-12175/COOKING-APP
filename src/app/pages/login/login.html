<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🍳 Welcome Back!</h1>
      <p>Sign in to access your favorite recipes</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="your@email.com"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <span class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <span class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        ⚠️ {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || loading">
        {{ loading ? '⏳ Logging in...' : '🔑 Login' }}
      </button>

      <p class="auth-switch">
        Don't have an account?
        <a routerLink="/register">Sign up</a>
      </p>
    </form>
  </div>
</div>
