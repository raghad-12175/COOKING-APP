<button class="cart-toggle" (click)="toggle()">
  🛒 <span class="badge">{{ (items$ | async)?.length || 0 }}</span>
</button>

<div class="drawer" [class.open]="isOpen">
  <div class="drawer-header">
    <h2>🛒 Shopping List</h2>
    <button class="close-btn" (click)="toggle()">✕</button>
  </div>

  <div class="drawer-content">
    <ng-container *ngIf="items$ | async as items">
      <p *ngIf="items.length === 0" class="empty">
        Your shopping list is empty. Add ingredients from recipes!
      </p>

      <ul class="items">
        <li *ngFor="let item of items">
          <div class="item-info">
            <strong>{{ item.amount }} {{ item.unit }}</strong> {{ item.name }}
          </div>
          <button (click)="removeItem(item)" class="remove-btn">🗑️</button>
        </li>
      </ul>

      <button 
        *ngIf="items.length > 0"
        (click)="clearList()" 
        class="clear-btn">
        Clear All
      </button>
    </ng-container>
  </div>
</div>

<div class="overlay" *ngIf="isOpen" (click)="toggle()"></div>
