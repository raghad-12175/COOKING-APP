<nav class="navbar">
  <div class="nav-container">
    <!-- Logo -->
    <a routerLink="/home" class="logo">
       <span>RecipeBook</span>
    </a>

    <!-- Navigation Links -->
    <ul class="nav-links">
      <li>
        <a routerLink="/home" routerLinkActive="active" class="nav-link">
          🏠 Home
        </a>
      </li>

      <li *ngIf="isLoggedIn()">
        <a routerLink="/favorites" routerLinkActive="active" class="nav-link">
          ❤️ Favorites
        </a>
      </li>

      <li *ngIf="isLoggedIn()">
        <a routerLink="/shopping" routerLinkActive="active" class="nav-link cart-link">
          🛒 Shopping
        </a>
      </li>

      <!-- Auth buttons -->
      <ng-container *ngIf="!isLoggedIn(); else loggedInTemplate">
        <li>
          <a routerLink="/login" class="nav-link auth-btn">
            🔑 Login
          </a>
        </li>
        <li>
          <a routerLink="/register" class="nav-link auth-btn signup">
            ✨ Sign Up
          </a>
        </li>
      </ng-container>

      <ng-template #loggedInTemplate>
        <li class="user-menu">
          <span class="user-name"> {{ userName() }}</span>
          <button (click)="logout()" class="logout-btn">
            🚪 Logout
          </button>
        </li>
      </ng-template>
    </ul>
  </div>
</nav>
