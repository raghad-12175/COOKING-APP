<div class="recipe-card" (click)="openDetails()">
  <div class="image-wrapper">
    <img 
      [src]="recipe.image" 
      [alt]="recipe.title"
      loading="lazy"
      class="recipe-image"
    />
    <button class="favorite-btn" (click)="addtoFavourites($event)">
      {{ isFav ? '❤️' : '🤍' }}
    </button>
  </div>
  <div class="recipe-info">
    <h3>{{ recipe.title }}</h3>
    <p class="prep-time" *ngIf="recipe.readyInMinutes">
      ⏱️ {{ recipe.readyInMinutes }} min
    </p>
  </div>
</div>
